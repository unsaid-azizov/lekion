services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/data/uploads
    depends_on:
      - frontend
      - backend

  frontend:
    build: ./frontend
    env_file: .env.frontend
    expose:
      - "3000"

  backend:
    build: ./backend
    env_file: .env.backend
    expose:
      - "8000"
    volumes:
      - uploads:/data/uploads
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: lekion
      POSTGRES_USER: lekion
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lekion}
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"

volumes:
  pgdata:
  redisdata:
  uploads:
